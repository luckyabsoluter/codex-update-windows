name: Reproduce Codex npm update EPERM on Windows

on:
  workflow_dispatch:

jobs:
  repro:
    runs-on: windows-latest

    steps:
      - name: Show environment
        shell: pwsh
        run: |
          node --version
          npm --version
          whoami
          $PSVersionTable

      - name: Install Codex globally
        shell: pwsh
        run: |
          npm install -g @openai/codex
          npm root -g
          npm bin -g
          codex --version

      - name: Locate codex.exe
        id: locate
        shell: pwsh
        run: |
          $cmd = Get-Command codex -ErrorAction Stop
          Write-Host "codex command: $($cmd.Source)"

          $globalRoot = npm root -g
          Write-Host "npm global root: $globalRoot"

          $exe = Get-ChildItem $globalRoot -Recurse -Filter codex.exe -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $exe) {
            throw "Could not find codex.exe under npm global root"
          }

          Write-Host "Found codex.exe: $exe"
          "CODEX_EXE=$exe" >> $env:GITHUB_ENV

      - name: Lock codex.exe handle
        shell: pwsh
        run: |
          $exe = $env:CODEX_EXE
          Write-Host "Opening file handle on: $exe"

          # Open codex.exe without FileShare.Delete.
          # This simulates Windows refusing npm cleanup/unlink while the exe is held.
          $script = @"
          `$path = '$exe'
          `$fs = [System.IO.File]::Open(
            `$path,
            [System.IO.FileMode]::Open,
            [System.IO.FileAccess]::Read,
            [System.IO.FileShare]::Read
          )
          Write-Host "Locked: `$path"
          Start-Sleep -Seconds 300
          `$fs.Dispose()
          "@

          $lockScript = Join-Path $env:RUNNER_TEMP "lock-codex.ps1"
          Set-Content -Path $lockScript -Value $script -Encoding UTF8

          Start-Process powershell `
            -ArgumentList "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "`"$lockScript`"" `
            -WindowStyle Hidden

          Start-Sleep -Seconds 3

      - name: Try updating Codex while codex.exe is locked
        shell: pwsh
        continue-on-error: true
        run: |
          npm install -g @openai/codex --foreground-scripts --loglevel verbose

      - name: Try uninstalling Codex while codex.exe is locked
        shell: pwsh
        continue-on-error: true
        run: |
          npm uninstall -g @openai/codex --foreground-scripts --loglevel verbose

      - name: Show npm logs
        if: always()
        shell: pwsh
        run: |
          $logDir = Join-Path $env:LOCALAPPDATA "npm-cache\_logs"
          Write-Host "npm log dir: $logDir"

          if (Test-Path $logDir) {
            Get-ChildItem $logDir -Filter "*.log" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 5 |
              ForEach-Object {
                Write-Host "`n===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 200
              }
          } else {
            Write-Host "No npm logs found"
          }

      - name: Cleanup lock process
        if: always()
        shell: pwsh
        run: |
          Get-Process powershell -ErrorAction SilentlyContinue |
            Where-Object { $_.Path -like "*powershell.exe" } |
            ForEach-Object {
              try {
                Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
              } catch {}
            }